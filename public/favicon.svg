<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle with warm amber gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Heart shape -->
  <path d="M16 22.5
    C16 22.5 7.5 17 7.5 11.5
    C7.5 9 9.5 7 12 7
    C13.5 7 14.8 7.8 16 9
    C17.2 7.8 18.5 7 20 7
    C22.5 7 24.5 9 24.5 11.5
    C24.5 17 16 22.5 16 22.5Z"
    fill="white"
    opacity="0.95"
  />
  <!-- Rings (two interlocked circles) -->
  <circle cx="13" cy="25.5" r="2.2" fill="none" stroke="white" stroke-width="1.2" opacity="0.85"/>
  <circle cx="19" cy="25.5" r="2.2" fill="none" stroke="white" stroke-width="1.2" opacity="0.85"/>
  <line x1="15.2" y1="25.5" x2="16.8" y2="25.5" stroke="url(#bg)" stroke-width="1.5"/>
</svg>
